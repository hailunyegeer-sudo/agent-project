default_toolset: basic_tools

settings:
  data_root: ../data

toolsets:
  basic_tools:
    - calculator
    - file_reader
    - local_file_search
    - table_analyzer
    - format_converter
  multimodal_tools:
    - calculator
    - file_reader
    - local_file_search
    - table_analyzer
    - format_converter
    - audio_preprocess
    - speech_to_text

  # 仅供 B1 在最终回答生成后强制调用；不属于 B4 的普通可选工具集。
  output_tools:
    - text_to_speech
tools:
  calculator:
    module: skills.calculator
    function: calculator
    description: Calculate a safe arithmetic expression.
    parameters:
      expression:
        type: string
        description: Arithmetic expression using numbers and supported operators.
    required: [expression]
    returns:
      result:
        type: number
        description: Calculated value.

  file_reader:
    module: skills.file_reader
    function: file_reader
    description: Read a local UTF-8 txt or md file from the data directory.
    parameters:
      path:
        type: string
        description: Path relative to the configured data root.
      max_chars:
        type: integer
        description: Maximum number of characters to return.
    required: [path]
    returns:
      content: {type: string, description: File content.}
      num_chars: {type: integer, description: Returned character count.}
      source: {type: string, description: Normalized path relative to data root.}
      truncated: {type: boolean, description: Whether content was truncated.}

  local_file_search:
    module: skills.local_file_search
    function: local_file_search
    description: Search local txt and md files for query terms.
    parameters:
      query: {type: string, description: Search query.}
      root_dir: {type: string, description: Directory relative to data root.}
      file_types:
        type: array
        items: {type: string}
        description: File extensions to search.
      top_k: {type: integer, description: Maximum number of matches.}
    required: [query]
    returns:
      results: {type: array, description: "Ranked paths, snippets, and scores."}

  table_analyzer:
    module: skills.table_analyzer
    function: table_analyzer
    description: Analyze a local CSV or TSV file.
    parameters:
      path: {type: string, description: Table path relative to data root.}
      max_rows_preview: {type: integer, description: Number of preview rows.}
      describe: {type: boolean, description: Whether to calculate numeric statistics.}
    required: [path]
    returns:
      num_rows: {type: integer, description: Data row count.}
      num_columns: {type: integer, description: Column count.}
      columns: {type: array, description: Column names.}
      preview: {type: array, description: First rows.}
      describe: {type: object, description: Numeric statistics by column.}

  format_converter:
    module: skills.format_converter
    function: format_converter
    description: Convert text to markdown bullets or formatted JSON and write the converted content to a file.
    parameters:
      text: {type: string, description: Input text.}
      target_format: {type: string, description: markdown or json.}
      output_filename: {type: string, description: Optional output filename. Defaults to converted.md or converted.json.}
    required: [text, target_format]
    returns:
      formatted_text: {type: string, description: Converted text.}
      generated_file_path: {type: string, description: Path of the generated output file.}

  audio_preprocess:
    module: skills.audio_preprocess
    function: audio_preprocess
    description: >-
      Prepare one local user-provided audio file for ASR. Convert it to mono,
      resample it to 16 kHz, trim leading and trailing silence, normalize amplitude,
      and return processed_audio_path. For an audio Agent input, this must be called
      before speech_to_text.
    parameters:
      audio_path:
        type: string
        description: Audio path relative to the configured data root.
    required: [audio_path]
    returns:
      processed_audio_path:
        type: string
        description: Absolute path of the 16 kHz mono WAV for speech_to_text.
      original:
        type: object
        description: Original audio metadata.
      processed:
        type: object
        description: Processed audio metadata.

  speech_to_text:
    module: skills.speech_to_text
    function: speech_to_text
    description: >-
      Transcribe one audio file with the project's fixed local faster-whisper model.
      Call this after audio_preprocess and pass its processed_audio_path. The returned
      text is the actual user request and must be used for subsequent Agent reasoning.
    parameters:
      audio_path:
        type: string
        description: >-
          Absolute processed_audio_path returned by audio_preprocess, or an original
          audio path relative to the configured data root for standalone ASR testing.
      language:
        type: string
        description: Optional source language code, such as en or zh. Omit for auto-detection.
    required: [audio_path]
    returns:
      text:
        type: string
        description: Recognized transcript; this is the user's actual request for audio input.
      language:
        type: string
        description: Detected source language code.
      segments:
        type: array
        description: Optional timestamped recognition segments.
      model:
        type: object
        description: Fixed local model and runtime metadata.
      inference:
        type: object
        description: ASR latency and real-time factor.

  text_to_speech:
    module: skills.text_to_speech
    function: text_to_speech
    description: >-
      Synthesize final response text into a WAV file with the project's CosyVoice2-0.5B
      runtime. This is a B1-controlled output tool and is not exposed to B4 for autonomous
      selection.
    parameters:
      text:
        type: string
        description: Final answer text to synthesize.
      language:
        type: string
        description: "Output language code: auto, zh, or en. Defaults to auto."
      output_filename:
        type: string
        description: Optional output WAV file name. Defaults to final_answer.wav.
    required: [text]
    returns:
      audio_path:
        type: string
        description: Absolute path of the generated WAV file.
      sample_rate:
        type: integer
        description: Generated audio sample rate.
      duration_sec:
        type: number
        description: Generated audio duration in seconds.
      language:
        type: string
        description: Resolved TTS language.
      chunk_count:
        type: integer
        description: Number of text chunks synthesized.
      model:
        type: object
        description: CosyVoice runtime metadata.

